<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molten Gold Voice Visualizer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #030200;
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
            color: #d4af37;
            pointer-events: none; /* Allows clicking through empty space */
        }

        h1 {
            margin: 0;
            font-weight: 300;
            font-size: 36px;
            letter-spacing: 12px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        #subtitle {
            margin-top: 8px;
            font-size: 11px;
            opacity: .7;
            letter-spacing: 5px;
        }

        button {
            margin-top: 30px;
            padding: 14px 28px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.6);
            color: #d4af37;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            pointer-events: auto;
            border-radius: 4px;
        }

        button:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        button.active {
            opacity: 0.3;
            border-color: rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body>

<div id="ui">
    <h1>MOLTEN GOLD</h1>
    <div id="subtitle">VOICE REACTIVE LIQUID METAL</div>
    <button id="startBtn">Activate Mic</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById("startBtn");

let W, H;
const TWO_PI = Math.PI * 2;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// AUDIO VARIABLE SETUP
let analyser;
let freqData;
let audioContextCreated = false;

startBtn.addEventListener("click", async () => {
    if (audioContextCreated) return;

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512; // Lower FFT size makes response punchier/faster
        analyser.smoothingTimeConstant = 0.8;
        
        freqData = new Uint8Array(analyser.frequencyBinCount);
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);

        startBtn.textContent = "Mic Connected";
        startBtn.classList.add("active");
        audioContextCreated = true;
    } catch (err) {
        console.error("Microphone access denied or error:", err);
        startBtn.textContent = "Error Accessing Mic";
    }
});

function getAudioData() {
    if (!analyser) {
        return { vol: 0, bass: 0, treble: 0 };
    }
    
    analyser.getByteFrequencyData(freqData);

    let volSum = 0;
    let bassSum = 0;
    let trebleSum = 0;
    
    const totalBins = freqData.length;
    const bassRange = Math.floor(totalBins * 0.15); // Bottom 15%
    const trebleStart = Math.floor(totalBins * 0.45); // Top 55%

    for (let i = 0; i < totalBins; i++) {
        const val = freqData[i];
        volSum += val;
        if (i < bassRange) bassSum += val;
        if (i >= trebleStart) trebleSum += val;
    }

    // Properly normalized values ranging roughly from 0.0 to 1.0
    return {
        vol: (volSum / totalBins) / 255,
        bass: (bassSum / bassRange) / 255,
        treble: (trebleSum / (totalBins - trebleStart)) / 255
    };
}

// PARTICLES ENGINE
const particles = [];
const PARTICLE_COUNT = 80;

for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size: Math.random() * 3 + 1,
        speed: Math.random() * 1.2 + 0.4
    });
}

let t = 0;

function drawGold(cx, cy, audio) {
    ctx.save();
    
    // Core sizing linked slightly to overall volume
    let baseR = Math.min(W, H) * 0.20 + (audio.vol * 40);

    // Dynamic glowing shadow based on intensity
    ctx.shadowBlur = 40 + (audio.bass * 80);
    ctx.shadowColor = `rgba(255, ${150 + audio.bass * 105}, 50, ${0.3 + audio.vol * 0.7})`;

    // Metallic gradient mapped over the shape
    let gradient = ctx.createRadialGradient(
        cx - baseR * 0.4, cy - baseR * 0.4, 0,
        cx, cy, baseR * 1.8
    );

    gradient.addColorStop(0, "#ffffff");
    gradient.addColorStop(0.1, "#fff3be");
    gradient.addColorStop(0.25, "#ffd24d");
    gradient.addColorStop(0.5, "#d4af37");
    gradient.addColorStop(0.75, "#8a6400");
    gradient.addColorStop(1, "#1a0f00");

    ctx.fillStyle = gradient;
    ctx.beginPath();

    const points = 240; // Reduced from 400 for better performance without visual quality loss
    for (let i = 0; i <= points; i++) {
        let angle = (i / points) * TWO_PI;

        // Wave 1: Heavy Bass distorted liquid core
        let wave1 = Math.sin(angle * 3 + t * 2.5) * (15 + audio.bass * 150);

        // Wave 2: Treble high frequency ripples
        let wave2 = Math.sin(angle * 12 - t * 4) * (5 + audio.treble * 40);

        // Wave 3: Volume-based slow dynamic melting/stretching
        let stretch = Math.cos(angle * 2 - t * 1.2) * (20 + audio.vol * 100);

        // Dynamic downward-biased drips
        let dripFactor = Math.max(0, Math.sin(angle + Math.PI / 2)); // Strongest at the bottom
        let drip = dripFactor * Math.sin(angle * 6 + t * 3) * (audio.bass * 80);

        let r = baseR + wave1 + wave2 + stretch + drip;

        let x = cx + Math.cos(angle) * r;
        let y = cy + Math.sin(angle) * r;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }

    ctx.closePath();
    ctx.fill();

    // Reflective Metallic Specular Arc Highlight
    ctx.beginPath();
    ctx.strokeStyle = "rgba(255, 255, 255, 0.45)";
    ctx.lineWidth = 6 + (audio.treble * 5);
    ctx.lineCap = "round";
    ctx.moveTo(cx - baseR * 0.5, cy - baseR * 0.3);
    ctx.quadraticCurveTo(cx, cy - baseR * 0.75, cx + baseR * 0.4, cy - baseR * 0.2);
    ctx.stroke();

    // Mercury-like Floating Droplets
    const dropCount = 18;
    for (let i = 0; i < dropCount; i++) {
        let orbitAngle = i * (TWO_PI / dropCount) + (t * 0.4);
        // Droplets extend outward depending heavily on bass and volume
        let distance = baseR + 50 + (Math.sin(t + i) * 30) + (audio.bass * 160);

        let x = cx + Math.cos(orbitAngle) * distance;
        let y = cy + Math.sin(orbitAngle) * distance;

        ctx.beginPath();
        // Droplets shift colors dynamically based on individual audio frequency presence
        ctx.fillStyle = audio.vol > 0.3 ? "#ffffff" : "#ffd700";
        ctx.arc(x, y, 3 + (audio.treble * 12), 0, TWO_PI);
        ctx.fill();
    }

    ctx.restore();
}

function animate() {
    requestAnimationFrame(animate);
    
    // Global time modifier
    t += 0.015;

    let audio = getAudioData();

    // Smooth trail effect (Lower opacity = longer ghosting trail)
    ctx.fillStyle = "rgba(3, 2, 0, 0.12)";
    ctx.fillRect(0, 0, W, H);

    // Render center liquid gold sculpture
    drawGold(W / 2, H / 2, audio);
