<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Molten Gold Voice Visualizer</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
height:100%;
font-family:Arial,sans-serif;
}

canvas{
display:block;
}

#ui{

position:absolute;
top:35px;
left:35px;
z-index:100;
color:#d4af37;

}

h1{

margin:0;
font-weight:200;
font-size:38px;
letter-spacing:10px;

}

#subtitle{

margin-top:10px;
font-size:11px;
opacity:.6;
letter-spacing:4px;

}

button{

margin-top:25px;

padding:14px 25px;

background:transparent;

border:1px solid rgba(212,175,55,.5);

color:#d4af37;

cursor:pointer;

font-size:12px;

letter-spacing:3px;

transition:.3s;

}

button:hover{

background:rgba(212,175,55,.15);

}

</style>

</head>

<body>

<div id="ui">

<h1>MOLTEN GOLD</h1>

<div id="subtitle">

VOICE REACTIVE LIQUID METAL

</div>

<button id="startBtn">

ACTIVATE MIC

</button>

</div>

<canvas id="canvas"></canvas>

<script>

const canvas=
document.getElementById(
"canvas"
);

const ctx=
canvas.getContext(
"2d"
);

let W,H;

function resize(){

W=
canvas.width=
window.innerWidth;

H=
canvas.height=
window.innerHeight;

}

resize();

window.addEventListener(
"resize",
resize
);


// AUDIO

let analyser;
let freqData;


document.getElementById(
"startBtn"
)
.addEventListener(
"click",
async()=>{

const stream=

await navigator
.mediaDevices
.getUserMedia({

audio:true

});

const audioCtx=
new AudioContext();

analyser=
audioCtx
.createAnalyser();

analyser.fftSize=
2048;

analyser.smoothingTimeConstant=
0.85;

freqData=
new Uint8Array(

analyser.frequencyBinCount

);

const source=
audioCtx
.createMediaStreamSource(
stream
);

source.connect(
analyser
);

}
);



function getAudioData(){

if(!analyser){

return{

vol:0,
bass:0,
treble:0

};

}

analyser.getByteFrequencyData(
freqData
);


let vol=0;
let bass=0;
let treble=0;


for(
let i=0;
i<freqData.length;
i++
){

vol+=
freqData[i];

}


for(
let i=0;
i<40;
i++
){

bass+=
freqData[i];

}


for(
let i=200;
i<500;
i++
){

treble+=
freqData[i];

}


vol/=
freqData.length
*
255;

bass/=
40
*
255;

treble/=
300
*
255;


return{

vol,
bass,
treble

};

}



// floating particles

const particles=[];

for(
let i=0;
i<60;
i++
){

particles.push({

x:
Math.random()
*
window.innerWidth,

y:
Math.random()
*
window.innerHeight,

size:
Math.random()
*
4
+
1,

speed:
Math.random()
*
1.5

});

}



let t=0;



function drawGold(
cx,
cy,
audio
){

ctx.save();

ctx.shadowBlur=
90;

ctx.shadowColor=
"#ffcc44";


let baseR=

Math.min(
W,
H
)
*
0.22;



let gradient=

ctx.createRadialGradient(

cx-baseR*.5,
cy-baseR*.5,
0,

cx,
cy,
baseR*2

);


// Gold material

gradient.addColorStop(
0,
"#ffffff"
);

gradient.addColorStop(
0.06,
"#fff9d7"
);

gradient.addColorStop(
0.18,
"#ffe082"
);

gradient.addColorStop(
0.35,
"#ffd700"
);

gradient.addColorStop(
0.55,
"#d4af37"
);

gradient.addColorStop(
0.8,
"#7c5a00"
);

gradient.addColorStop(
1,
"#120700"
);


ctx.fillStyle=
gradient;


ctx.beginPath();


const points=
400;


for(
let i=0;
i<=points;
i++
){

let angle=

(i/points)
*
Math.PI
*
2;


// primary shape

let wave1=

Math.sin(
angle*3+
t*2
)
*
(
25+
audio.bass*120
);


// secondary detail

let wave2=

Math.sin(
angle*8+
t*5
)
*
(
10+
audio.vol*60
);


// stretched liquid

let stretch=

Math.cos(
angle*2-
t
)
*
(
50+
audio.bass*150
);


// drips

let drip=

Math.max(

0,

Math.sin(
angle*7+
t*4
)

)

*
audio.vol
*
100;


let r=

baseR+

wave1+

wave2+

stretch+

drip;


let x=

cx+

Math.cos(
angle
)
*
r;


let y=

cy+

Math.sin(
angle
)
*
r;



if(i===0){

ctx.moveTo(
x,
y
);

}
else{

ctx.lineTo(
x,
y
);

}

}

ctx.closePath();

ctx.fill();



// reflective metallic streak

ctx.beginPath();

ctx.strokeStyle=
"rgba(255,255,255,.6)";

ctx.lineWidth=
10;


ctx.moveTo(

cx-baseR*.6,

cy-baseR*.35

);

ctx.quadraticCurveTo(

cx,

cy-baseR*.8,

cx+baseR*.5,

cy-baseR*.2

);

ctx.stroke();



// droplets

for(
let i=0;
i<25;
i++
){

let a=
i*.4+t;

let d=
baseR+
Math.sin(
t+i
)
*
120;


let x=

cx+
Math.cos(a)
*d;


let y=

cy+
Math.sin(a)
*d;


ctx.beginPath();

ctx.fillStyle=
"#ffd24d";

ctx.arc(

x,
y,

2+
audio.treble*8,

0,
Math.PI*2

);

ctx.fill();

}


ctx.restore();

}



function animate(){

requestAnimationFrame(
animate
);

t+=0.01;


let audio=
getAudioData();


// smooth trail effect

ctx.fillStyle=
"rgba(0,0,0,.08)";

ctx.fillRect(
0,
0,
W,
H
);


// center sculpture

drawGold(

W/2,
H/2,
audio

);


// particles

for(
let p of particles
){

p.y+=
p.speed+
audio.vol*3;


if(
p.y>
H
){

p.y=0;

p.x=
Math.random()
*W;

}


ctx.beginPath();

ctx.fillStyle=
"rgba(255,215,0,.7)";

ctx.arc(

p.x,
p.y,

p.size,

0,
Math.PI*2

);

ctx.fill();

}

}


animate();

</script>

</body>
</html>
