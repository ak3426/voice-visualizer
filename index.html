<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Molten Gold Voice Engine</title>

<style>

html,body{

margin:0;
overflow:hidden;
background:#000;
height:100%;

font-family:Arial,sans-serif;

}

canvas{

display:block;

}

#panel{

position:absolute;
left:40px;
top:40px;
color:#d4af37;
z-index:100;

opacity:.9;

}

h1{

font-weight:200;
letter-spacing:8px;
margin:0;

font-size:40px;

}

.small{

font-size:12px;
letter-spacing:4px;
opacity:.6;

}

button{

margin-top:30px;

background:transparent;
color:#d4af37;

border:1px solid rgba(212,175,55,.5);

padding:15px 25px;

cursor:pointer;

font-size:12px;

letter-spacing:2px;

}

</style>

</head>

<body>

<div id="panel">

<h1>VOICE PATTERN</h1>

<div class="small">

WEB AUDIO / MOLTEN GOLD ENGINE

</div>

<button id="mic">

ACTIVATE MIC

</button>

</div>


<canvas id="c"></canvas>


<script>

const canvas=
document.getElementById("c");

const ctx=
canvas.getContext("2d");

let W,H;

function resize(){

W=canvas.width=
window.innerWidth;

H=canvas.height=
window.innerHeight;

}

resize();

window.addEventListener(
"resize",
resize
);


let analyser;
let data;


document.getElementById(
"mic"
)
.onclick=
async()=>{


const stream=
await navigator
.mediaDevices
.getUserMedia({
audio:true
});

const audioCtx=
new AudioContext();

analyser=
audioCtx
.createAnalyser();

analyser.fftSize=2048;

data=
new Uint8Array(
analyser.frequencyBinCount
);

const source=
audioCtx
.createMediaStreamSource(
stream
);

source.connect(
analyser
);

};


function getAudio(){

if(!analyser)
return{
vol:0,
bass:0
};

analyser.getByteFrequencyData(
data
);

let vol=0;
let bass=0;


for(
let i=0;
i<data.length;
i++
){

vol+=data[i];

}

for(
let i=0;
i<40;
i++
){

bass+=data[i];

}

vol/=
data.length*255;

bass/=
40*255;

return{
vol,
bass
};

}



const blobs=[];

for(
let i=0;
i<12;
i++
){

blobs.push({

angle:
Math.random()
*
Math.PI
*
2,

orbit:
100+
Math.random()
*
220,

size:
50+
Math.random()
*
70,

speed:
(
Math.random()
-
.5
)
*
.01,

offset:
Math.random()
*
1000

});

}


const particles=[];

for(
let i=0;
i<150;
i++
){

particles.push({

x:
Math.random()
*W,

y:
Math.random()
*H,

size:
Math.random()*4,

speed:
Math.random()*1.5

});

}



let t=0;


function render(){

requestAnimationFrame(
render
);

t+=.01;


const audio=
getAudio();


// background fade

ctx.fillStyle=
"rgba(0,0,0,.08)";

ctx.fillRect(
0,
0,
W,
H
);


// metallic liquid body

ctx.globalCompositeOperation=
"lighter";


for(
let b of blobs
){


b.angle+=
b.speed*
(
1+
audio.bass*6
);


let x=

W/2+

Math.cos(
b.angle
)
*
b.orbit;


let y=

H/2+

Math.sin(
b.angle
)
*
b.orbit;


let r=

b.size+

Math.sin(

t*4+

b.offset

)

*

(
30+
audio.vol*100
);



let g=

ctx.createRadialGradient(

x-r*.4,
y-r*.4,
0,

x,
y,
r

);


// realistic gold

g.addColorStop(
0,
"#ffffff"
);

g.addColorStop(
0.08,
"#fff4d6"
);

g.addColorStop(
0.25,
"#ffe082"
);

g.addColorStop(
0.5,
"#d4af37"
);

g.addColorStop(
0.7,
"#8a6500"
);

g.addColorStop(
1,
"#120800"
);



ctx.shadowBlur=
100;

ctx.shadowColor=
"#ffcf40";

ctx.fillStyle=
g;


ctx.beginPath();

for(
let a=0;
a<
Math.PI*2;
a+=.06
){

let wave=

Math.sin(

a*7+

t*4+

b.offset

)

*

(
25+
audio.bass*100
);


let rr=
r+wave;


let px=
x+
Math.cos(a)
*
rr;


let py=
y+
Math.sin(a)
*
rr;


if(a===0){

ctx.moveTo(
px,
py
);

}
else{

ctx.lineTo(
px,
py
);

}

}


ctx.closePath();

ctx.fill();

}


// floating droplets

for(
let p of particles
){

p.y+=
p.speed+
audio.vol*3;

if(
p.y>
H
){

p.y=0;
p.x=
Math.random()
*
W;

}

ctx.beginPath();

ctx.fillStyle=
"rgba(255,220,100,.8)";

ctx.arc(

p.x,
p.y,

p.size,

0,

Math.PI*2

);

ctx.fill();

}


ctx.globalCompositeOperation=
"source-over";


// reflective floor

let reflection=

ctx.createLinearGradient(
0,
H*.6,
0,
H
);

reflection.addColorStop(
0,
"rgba(255,180,0,.15)"
);

reflection.addColorStop(
1,
"transparent"
);

ctx.fillStyle=
reflection;

ctx.fillRect(
0,
H*.6,
W,
H
);

}


render();

</script>

</body>

</html>
