<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice Visualizer</title>

<!-- Fonts -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap');

body {
  margin: 0;
  overflow: hidden;
  background: #020b18; /* softer background */
  font-family: 'Space Grotesk', sans-serif;
}

#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;
}

button {
  margin: 5px;
  padding: 8px 12px;
  border: 1px solid rgba(255,255,255,0.4);
  background: transparent;
  color: white;
  cursor: pointer;
}

h1 {
  position: fixed;
  top: 20px;
  left: 20px;
  color: rgba(255,255,255,0.7);
  font-family: 'Playfair Display', serif;
}
</style>
</head>

<body>

<h1>VOICE VISUALIZER</h1>

<canvas id="c"></canvas>

<div id="controls">
  <button data-mode="0">Lissajous</button>
  <button data-mode="1">Mandala</button>
  <button id="start">Activate Mic</button>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let analyser, dataArray, timeData;
let running = false;
let mode = 0;

// AUDIO SETUP
document.getElementById("start").onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const audioCtx = new AudioContext();
  const source = audioCtx.createMediaStreamSource(stream);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 4096;
  analyser.smoothingTimeConstant = 0.85;

  source.connect(analyser);

  dataArray = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);

  running = true;
};

// MODE SWITCH
document.querySelectorAll("button[data-mode]").forEach(btn => {
  btn.onclick = () => mode = Number(btn.dataset.mode);
});

// VARIABLES
let sRMS = 0, sBass = 0, sMid = 0, sTreble = 0;
let sHue = 200;

// MAIN LOOP
function render(t = 0) {
  requestAnimationFrame(render);

  ctx.fillStyle = "rgba(2,11,24,0.08)";
  ctx.fillRect(0, 0, W, H);

  if (running && analyser) {
    analyser.getByteFrequencyData(dataArray);
    analyser.getByteTimeDomainData(timeData);

    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
    let rms = sum / dataArray.length / 255;

    let bass = dataArray.slice(0, 50).reduce((a,b)=>a+b,0)/50/255;
    let mid  = dataArray.slice(200, 600).reduce((a,b)=>a+b,0)/400/255;
    let treble = dataArray.slice(800, 1200).reduce((a,b)=>a+b,0)/400/255;

    const sm = 0.15;
    sRMS = sRMS*(1-sm) + rms*sm*5;
    sBass = sBass*(1-sm) + bass*sm*3;
    sMid = sMid*(1-sm) + mid*sm*3;
    sTreble = sTreble*(1-sm) + treble*sm*3;

    // COLOR (cool palette)
    let targetHue = (sTreble * 200) + 160;
    sHue = sHue * 0.8 + targetHue * 0.2;
  }

  if (mode === 0) drawLissajous(t);
  if (mode === 1) drawMandala(t);
}

render();

// Lissajous
function drawLissajous(t) {
  ctx.beginPath();

  let cx = W/2, cy = H/2;
  for (let i = 0; i < 300; i++) {
    let a = i / 300 * Math.PI * 2;
    let x = cx + Math.sin(a * (2 + sBass*2)) * 200;
    let y = cy + Math.sin(a * (3 + sTreble*2) + t*0.002) * 200;

    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }

  ctx.strokeStyle = `hsl(${sHue},90%,60%)`;
  ctx.lineWidth = 2 + sRMS * 5;
  ctx.stroke();
}

// Mandala
function drawMandala(t) {
  let cx = W/2, cy = H/2;
  let petals = Math.round(5 + sTreble * 10);

  for (let i = 0; i < petals; i++) {
    let angle = i / petals * Math.PI * 2 + t * 0.001;

    let len = 100 + sBass * 200;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(
      cx + Math.cos(angle) * len,
      cy + Math.sin(angle) * len
    );
let intensity = Math.min(sRMS * 1.5, 1); // 0 → 1

let red = 255;
let green = Math.floor(255 * (1 - intensity));
let blue = Math.floor(255 * (1 - intensity));

ctx.strokeStyle = `rgb(${red}, ${green}, ${blue})`;
ctx.lineWidth = 2 + sRMS * 5;
ctx.stroke();
  }
}
</script>

</body>
</html>
